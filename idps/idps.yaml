mc-gcp-to-ieb-preprod:
  project-name: ${paws.idpsProjectName}
  roles:
    app-qal:
      comment: "for Application QAL secrets" 
    app-e2e:
      comment: "for Application E2E secrets" 
  policies:
    app-qal:
      access-control-roles: app-qal
      read-only: true
      cloud-platform: ec2
      aws:
        iam-role: "${paws.qalNamespaceIamRole}"
        aws-region: us-west-2
        ami-only-intuit-official: true
    app-e2e:
      access-control-roles: app-e2e
      read-only: true
      cloud-platform: ec2
      aws:
        iam-role: "${paws.qalNamespaceIamRole}"
        aws-region: us-west-2
        ami-only-intuit-official: true
  secrets:
    mc-gcp-to-ieb-app-secret:
      source-type: prompt
      source-arguments:
        prompt: "Enter your PreProd APP Secret from DevPortal"
      roles: [ app-qal, app-e2e ]
      is_enumerable: true
      is_exportable: true
